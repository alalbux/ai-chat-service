services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rtchat
      POSTGRES_PASSWORD: rtchat
      POSTGRES_DB: rtchat
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rtchat -d rtchat']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rtchat

  api:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://rtchat:rtchat@postgres:5432/rtchat?schema=public
      PORT: '3000'
      LLM_MOCK: '1'
      NODE_ENV: production
      DD_TRACE_ENABLED: ${DD_TRACE_ENABLED:-false}
      DD_AGENT_HOST: ${DD_AGENT_HOST:-datadog-agent}
      DD_TRACE_AGENT_PORT: ${DD_TRACE_AGENT_PORT:-8126}
      DD_SERVICE: ${DD_SERVICE:-rt-chat-api}
      DD_ENV: ${DD_ENV:-local}
      DD_VERSION: ${DD_VERSION:-0.0.1}
      DD_LOGS_INJECTION: ${DD_LOGS_INJECTION:-false}
      DD_TRACE_SAMPLE_RATE: ${DD_TRACE_SAMPLE_RATE:-1}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rtchat

  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    profiles:
      - datadog
    networks:
      - rtchat
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_APM_ENABLED: 'true'
      DD_APM_NON_LOCAL_TRAFFIC: 'true'

networks:
  rtchat:
    name: rtchat
    driver: bridge

volumes:
  pgdata:
