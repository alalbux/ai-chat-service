services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rtchat
      POSTGRES_PASSWORD: rtchat
      POSTGRES_DB: rtchat
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rtchat -d rtchat']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://rtchat:rtchat@postgres:5432/rtchat?schema=public
      PORT: '3000'
      LLM_MOCK: '1'
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
