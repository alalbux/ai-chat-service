apiVersion: apps/v1
kind: Deployment
metadata:
  name: rt-chat-api
  labels:
    app: rt-chat-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rt-chat-api
  template:
    metadata:
      labels:
        app: rt-chat-api
    spec:
      containers:
        - name: api
          image: ghcr.io/example/ai-chat-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: '3000'
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rt-chat-secrets
                  key: database_url
            - name: LLM_MOCK
              value: '0'
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: '1'
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
