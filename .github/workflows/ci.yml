name: CI for AI Chat API

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and run actionlint
        shell: bash
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash | bash -s -- 1.7.12
          ./actionlint -color

  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint:ci
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-latest
    env:
      DD_API_KEY_PRESENT: ${{ secrets.DD_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build -w @ai-chat/contracts
      - run: npm run test:cov -w @ai-chat/contracts
      - run: npm run test:cov -w @ai-chat/api
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            apps/api/coverage
            packages/contracts/coverage
      - name: Upload coverage reports to Datadog
        if: env.DD_API_KEY_PRESENT == 'true'
        uses: DataDog/coverage-upload-github-action@v1
        with:
          api_key: ${{ secrets.DD_API_KEY }}
          site: us5.datadoghq.com
      - run: npm run build -w @ai-chat/api
      - run: npm run build -w @ai-chat/demo-ui

  api-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rtchat
          POSTGRES_PASSWORD: rtchat
          POSTGRES_DB: rtchat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rtchat -d rtchat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://rtchat:rtchat@localhost:5432/rtchat?schema=public
      LLM_MOCK: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build -w @ai-chat/contracts
      - run: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma
      - run: npm run build -w @ai-chat/api
      - run: npm run test:e2e -w @ai-chat/api

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: rt-chat-api:ci
          load: true
