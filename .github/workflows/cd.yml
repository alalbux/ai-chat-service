name: CD for AI Chat API

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ai-chat-api

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run ci

  publish-image:
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-staging:
    needs: publish-image
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ vars.ENABLE_CD_STAGING == 'true' }}
    steps:
      - run: |
          echo "Wire this job to your staging cluster (kubectl, Helm, etc.)."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

  smoke-staging:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - run: echo "HTTP checks against staging /health/live and /health/ready"

  deploy-production:
    needs: publish-image
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: |
          echo "Rolling update to production (placeholder)."
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

  post-deploy-health:
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - run: echo "Validate production health; on failure trigger rollback (kubectl rollout undo, etc.)."
